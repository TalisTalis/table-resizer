<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TableResizer – демо</title>
    <!-- Bootstrap (опционально, для красоты) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 20px; }
        .table th { position: relative; }
        /* Стили для тултипа Bootstrap (если используется) */
    </style>
</head>
<body>
    <div class="container">
        <h1>TableResizer – демонстрация</h1>
        <p>Перетаскивайте границы заголовков, чтобы изменить ширину. Двойной клик – автоподбор.</p>
        <table id="demoTable" class="table table-bordered table-resizable">
            <thead>
                <tr>
                    <th data-column="id" data-type="id">ID</th>
                    <th data-column="name" data-type="name">Имя</th>
                    <th data-column="email" data-type="email">Email</th>
                    <th data-column="date" data-type="date">Дата</th>
                    <th data-column="status" data-type="status">Статус</th>
                    <th data-column="actions" data-type="action" class="column-control-header">Действия</th>
                </tr>
            </thead>
            <tbody>
                <tr><td>1</td><td>Иван Иванов</td><td>ivan@mail.ru</td><td>12.05.2024</td><td>Активен</td><td>✎</td></tr>
                <tr><td>2</td><td>Петр Петров</td><td>petr@mail.ru</td><td>03.11.2023</td><td>Заблокирован</td><td>✎</td></tr>
                <tr><td>3</td><td>Сидор Сидоров</td><td>sidor@mail.ru</td><td>22.01.2024</td><td>Ожидает</td><td>✎</td></tr>
            </tbody>
        </table>
    </div>

    <!-- Подключаем библиотеку -->
    <script src="table-resizer-v1.3.3.min.js"></script>
    <script>
        // Инициализация
        window.tableResizer.init('demoTable', {
            disabledColumns: ['actions'], // столбец действий не ресайзится
            defaultWidth: 200
        });
    </script>
</body>
</html>
